<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Trajectory Analysis</title>
    <!-- 1. CORRECT PLOTLY CDN -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --secondary: #666666;
            --accent: #000000;
            --border: #dddddd;
            --serif: "Times New Roman", Times, Baskerville, Georgia, serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--serif);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .header { padding: 40px 40px 20px 40px; max-width: 1400px; margin: 0 auto; }
        .header h1 { font-size: 1.8rem; font-weight: 400; letter-spacing: -0.02em; }
        .header p { font-style: italic; color: var(--secondary); font-size: 0.95rem; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px 40px 40px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 60px;
        }

        /* MINIMALIST OUTLINE BUTTONS */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            align-items: center;
            border-bottom: 1px solid #eeeeee;
            padding-bottom: 20px;
        }

        button {
            background: white;
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--serif);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 6px 16px;
            transition: all 0.2s ease;
        }

        button:hover { border-color: var(--accent); background: #fafafa; }

        select {
            border: 1px solid var(--border);
            font-family: var(--serif);
            font-size: 0.85rem;
            padding: 5px 10px;
            background: white;
            outline: none;
        }

        .viz-panel { height: 600px; width: 100%; background: #fafafa; border: 1px solid #f0f0f0; }
        #trajectory-plot { height: 600px !important; width: 100%; }

        .sidebar { display: flex; flex-direction: column; gap: 40px; }
        .data-point { border-top: 1px solid #eeeeee; padding-top: 15px; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--secondary); margin-bottom: 10px; display: block; }
        .value { font-size: 1.6rem; font-weight: 400; }

        /* VITALS LIST STYLING */
        .vital-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.95rem; }
        .vital-name { color: var(--secondary); }

        .risk-container { width: 100%; height: 2px; background: #f0f0f0; margin-top: 15px; }
        .risk-fill { height: 100%; background: #000000; width: 0%; transition: width 0.4s ease; }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <h1>Patient Trajectory Analysis</h1>
        <p></p>
    </header>

    <div class="container">
        <main>
            <div class="controls">
                <button id="play-btn">Play</button>
                <button id="reset-btn">Reset</button>
                <button id="skip-btn">Skip</button>
                <select id="patient-select">
                    <option value="">Select Patient ID</option>
                </select>
                <button id="rotate-btn" style="margin-left: auto;">Rotate</button>
            </div>
            <div class="viz-panel">
                <div id="trajectory-plot"></div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="data-point">

                <div class="risk-container"><div class="risk-fill" id="risk-fill"></div></div>
            </div>
            <div class="data-point">

            </div>
            <div class="data-point">
                <span class="label">Active Parameters</span>
                <div id="vitals-container">
                    <!-- Populated by JS -->
                </div>
            </div>
        </aside>

        // Add aliases for the expected field names
        DATA.patients.forEach(p => {
            p.time_dense = p.time;
            p.risk_dense = p.risk;
            p.vitals_dense = p.vitals;
        });
        let currentFrame = 0;
        let isPlaying = false;
        let animationInterval = null;
        let rotateInterval = null;
        let isUpdating = false;
        let rotationAngle = 0; // Track rotation angle globally

        // Initialize
        window.addEventListener('load', () => {
            const selector = document.getElementById('patient-select');
            DATA.patients.forEach((p, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = `Patient ${i+1} (${p.actual_outcome === 0 ? 'Survived' : 'Deceased'})`;
                selector.appendChild(opt);
            });
            
            loadPatient(DATA.default_patient_index);
        });

        function loadPatient(idx) {
            window.patientIdx = idx;
            currentFrame = 0;
            stopAnimation();
            
            const p = DATA.patients[idx];
            window.currentPatient = p;
            

            // BUILD VITALS GRID
            const container = document.getElementById('vitals-container');
            container.innerHTML = '';
            p.top_vitals.forEach(v => {
                const item = document.createElement('div');
                item.className = 'vital-item';
                item.innerHTML = `
                    <div class="vital-name">${v.label}</div>
                    <div class="vital-val" id="val-${v.key}">--</div>
                `;
                container.appendChild(item);
            });

            // Prepare visual data
            // Use the same data for both dense and sparse (since you only have one set)
            const colors = p.risk_dense.map(r => r < 0.3 ? '#34d399' : r < 0.6 ? '#fbbf24' : '#ef4444');
            const sparseColors = p.risk.map(r => r < 0.3 ? '#34d399' : r < 0.6 ? '#fbbf24' : '#ef4444');

            const zKey = p.primary_axis;
            const zLabel = p.primary_label;
            
            const zDataDense = p.vitals_dense[zKey];
            const zDataSparse = p.vitals[zKey];
        
            
            window.zDataDense = zDataDense;
            window.zDataSparse = zDataSparse;
            window.denseColors = colors;
            window.sparseColors = sparseColors;

            // Format for axis based on data range
            const maxZ = Math.max(...zDataSparse.filter(v => v !== null));
            const tickFmt = maxZ > 10 ? '.0f' : '.2f';

            // TRACE 0: Line
            const traceLine = {
                type: 'scatter3d',
                mode: 'lines',
                x: [p.time_dense[0]], y: [p.risk_dense[0]], z: [zDataDense[0]],
                line: { width: 6, color: colors[0], shape: 'spline' }, // Spline gives smooth look
                name: 'Trajectory',
                hoverinfo: 'skip'
            };

            // TRACE 1: Head Marker
            const traceHead = {
                type: 'scatter3d',
                mode: 'markers',
                x: [p.time_dense[0]], y: [p.risk_dense[0]], z: [zDataDense[0]],
                marker: { size: 8, color: colors[0], line: {color: '#fff', width: 2} },
                hoverinfo: 'skip'
            };

            // TRACE 2: Interactive Dots (Hidden initially)
            const traceDots = {
                type: 'scatter3d',
                mode: 'markers',
                x: [], y: [], z: [],
                marker: { 
                    size: 12,  // Larger for iPad
                    color: sparseColors, 
                    opacity: 0.9 
                },
                text: p.time.map((t, i) => `Risk: ${(p.risk[i]*100).toFixed(1)}%`),
                hoverinfo: 'text'
            };

            const layout = {
                paper_bgcolor: '#22283d',
                plot_bgcolor: '#22283d',
                font: { color: '#cbd5e1', size: 11 },
                margin: {t:0, l:0, r:0, b:0},
                scene: {
                    xaxis: { 
                        title: 'Time (h)', 
                        gridcolor: '#333a52', 
                        backgroundcolor: '#1a1d2e',
                        showspikes: false,
                        range: [0, Math.max(...p.time_dense) * 1.05] // LOCK X AXIS
                    },
                    yaxis: { 
                        title: 'Risk', 
                        gridcolor: '#333a52', 
                        backgroundcolor: '#1a1d2e', 
                        tickformat: '.0%',
                        showspikes: false,
                        range: [0, 1] // LOCK Y AXIS (0-100%)
                    },
                    zaxis: { 
                        title: zLabel, 
                        gridcolor: '#333a52', 
                        backgroundcolor: '#1a1d2e', 
                        tickformat: tickFmt,
                        showspikes: false,
                        range: [ // LOCK Z AXIS
                            Math.min(...zDataDense.filter(v => v !== null)) * 0.95,
                            Math.max(...zDataDense.filter(v => v !== null)) * 1.05
                        ]
                    },
                    camera: { eye: {x:1.6, y:1.2, z:1.2} }
                },
                showlegend: false
            };

            Plotly.newPlot('trajectory-plot', 
                [traceLine, traceHead, traceDots],
                layout, 
                {displayModeBar: false, responsive: true}
            );

            // Click interaction - NO 3D RESTYLE ON CLICK (Prevents Crash)
            const plotEl = document.getElementById('trajectory-plot');
            plotEl.removeAllListeners && plotEl.removeAllListeners('plotly_click');
            
            plotEl.on('plotly_click', data => {
                const pt = data.points[0];
                if (pt.curveNumber === 2) { // Clicked on sparse dot (Trace 2)
                    stopAnimation();
                    const idx = pt.pointNumber;
                    // Just update panel, do NOT touch the graph (lightweight)
                    updatePanel(idx, false);
                }
            });

            updatePanel(0, true);
        }

        function updatePanel(idx, isDense) {
            const p = window.currentPatient;
            const risk = isDense ? p.risk_dense[idx] : p.risk[idx];
            const time = isDense ? p.time_dense[idx] : p.time[idx];
            const vitals = isDense ? p.vitals_dense : p.vitals;

            document.getElementById('risk-value').textContent = (risk * 100).toFixed(1) + '%';
            document.getElementById('risk-fill').style.width = (risk * 100) + '%';
            document.getElementById('icu-time').textContent = time.toFixed(1) + 'h';

            p.top_vitals.forEach(v => {
                const el = document.getElementById(`val-${v.key}`);
                if (el) {
                    let val = isDense ? vitals[v.key][idx] : vitals[v.key][idx];
                    if (val === null || val === undefined) el.textContent = '--';
                    else el.textContent = Math.round(val * 10) / 10;
                }
            });
        }

        function stopAnimation() {
            isPlaying = false;
            clearInterval(animationInterval);
            document.getElementById('play-btn').textContent = 'Play';
        }

        function animate() {
            const p = window.currentPatient;
            
            // Use time_dense for smooth animation
            Plotly.restyle('trajectory-plot', {
                x: [
                    p.time_dense.slice(0, currentFrame + 1),
                    [p.time_dense[currentFrame]],
                    []
                ],
                y: [
                    p.risk_dense.slice(0, currentFrame + 1),
                    [p.risk_dense[currentFrame]],
                    []
                ],
                z: [
                    window.zDataDense.slice(0, currentFrame + 1),
                    [window.zDataDense[currentFrame]],
                    []
                ],
                'line.color': [window.denseColors.slice(0, currentFrame + 1)],
                'marker.color': [[window.denseColors[currentFrame]], undefined, undefined]
            }, [0, 1, 2]);
        
            updatePanel(currentFrame, true);
            currentFrame++;
        
            if (currentFrame >= p.time_dense.length) {  // Also change this check
                finishAnimation();
            }
        }
        function finishAnimation() {
            stopAnimation();
            const p = window.currentPatient;
            
            // Show Dots (Trace 2) and complete Line (Trace 0)
            Plotly.restyle('trajectory-plot', {
                x: [p.time_dense, p.time], 
                y: [p.risk_dense, p.risk], 
                z: [window.zDataDense, window.zDataSparse],
                visible: [true, true]
            }, [0, 2]);
            
            // Position Head at end (Trace 1)
            Plotly.restyle('trajectory-plot', {
                x: [[p.time_dense[p.time_dense.length-1]]],
                y: [[p.risk_dense[p.risk_dense.length-1]]],
                z: [[window.zDataDense[p.time_dense.length-1]]],
                'marker.color': [window.denseColors[p.time_dense.length-1]]
            }, [1]);
            
            currentFrame = p.time_dense.length - 1;
            updatePanel(currentFrame, true);
        }

        document.getElementById('play-btn').onclick = () => {
            if (isPlaying) stopAnimation();
            else {
                if (currentFrame >= window.currentPatient.time_dense.length - 1) {
                    currentFrame = 0;
                    // Reset: Hide dots (Trace 2)
                    Plotly.restyle('trajectory-plot', {x:[[], [], []], y:[[], [], []], z:[[], [], []]}, [2]);
                }
                isPlaying = true;
                document.getElementById('play-btn').textContent = 'Pause';
                animationInterval = setInterval(animate, 200); // SLOWED DOWN TO ~12 FPS
            }
        };
        
        document.getElementById('skip-btn').onclick = () => {
            finishAnimation();
        };

        document.getElementById('reset-btn').onclick = () => loadPatient(window.patientIdx);
        document.getElementById('patient-select').onchange = (e) => loadPatient(parseInt(e.target.value));
        
        document.getElementById('rotate-btn').onclick = function() {
            if (rotateInterval) {
                clearInterval(rotateInterval);
                rotateInterval = null;
                this.textContent = 'Rotate';
            } else {
                rotateInterval = setInterval(() => {
                    rotationAngle += 0.005;
                    Plotly.relayout('trajectory-plot', {
                        'scene.camera.eye': {x: 1.6*Math.cos(rotationAngle), y: 1.6*Math.sin(rotationAngle), z: 1.2}
                    });
                }, 30);
                this.textContent = 'Stop';
            }
        };
    </script>
